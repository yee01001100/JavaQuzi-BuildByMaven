name: Sync GitHub to Gitee

on:
  push:
    branches: [ main, master ]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout GitHub code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH for Gitee
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts
          echo "${SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GITEE_RSA_PRIVATE_KEY }}

      - name: Diagnostic info
        run: |
          echo "=== Local branches ==="
          git branch -a
          echo "=== Recent commits ==="
          git log --oneline -5
          echo "=== Remote branches on Gitee ==="
          git ls-remote --heads git@gitee.com:yee01001100/java-quzi-build-by-maven.git

      - name: Force push to Gitee
        run: |
          git remote add gitee git@gitee.com:yee01001100/java-quzi-build-by-maven.git
          echo "=== Pushing all branches ==="
          git push --force --all gitee
          echo "=== Pushing all tags ==="
          git push --force --tags gitee
          echo "=== Verify after push ==="
          git ls-remote --heads gitee